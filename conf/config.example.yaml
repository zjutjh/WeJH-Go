app:
  name: "wejh" # 应用名称
  env: "test" # 应用环境 dev|test|prod

http_server:
  addr: ":8080"
  log:


# HTTP Client 配置
resty:
  timeout: "5s"

# 跨域中间件配置
mid_cors:
  allow_origins: [
      # 本地/测试等环境配置 正式环境须去除
      "*",
      "https://test.*.com",

      # 生产环境配置
      "https://prod.*.com",
    ]

db:
  database: wejh_db
  host: "127.0.0.1"
  port: 3306
  username: root
  password: 

redis:
  host: "127.0.0.1"
  port: 6379
  db: 0
  user: root
  pass: 

wechat: # 微信小程序相关配置 (切记不能泄漏）
  appid: 
  appsecret: 

funnel: 
  host: 

zfCircuit:
  studentId: 
  oauthPassword: 
  zfPassword: 
  duration: 
  apis: 
    -

user:
  host: 

yxy:
  host: 

log:
  disableStacktrace: false
  level: 5
  name: "wjh"
  writer: "all"
  loggerDir: "./logs"
  logMaxSize: 10
  logMaxAge: 7
  logCompress: false


feishu:
  enable: false
  notice_webhook: ""
  notice_secret: ""


session:
  driver: "redis"
  name: "session"
  secret: 
  redis: 
    address: "127.0.0.1:6379"
    password: 
    db: "0"
  max_age:
